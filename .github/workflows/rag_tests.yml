# 给这个自动化任务起个名字：RAG 全量质量测试
name: RAG Full Quality Tests

# 什么时候自动开始运行？
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 要执行的任务
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-html ragas datasets

    - name: Run ALL RAG tests (质量 + 对抗 + 性能 + 鲁棒性)
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        python run_all_tests.py

    - name: Upload combined test report
      uses: actions/upload-artifact@v4
      with:
        name: full-qa-report
        path: combined_report.html
