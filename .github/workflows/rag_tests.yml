# 文件路径：.github/workflows/rag_tests.yml

# 任务名称：RAG 完整质量流水线
name: RAG Full Quality Pipeline

# 触发条件：什么时候自动执行？
on:
  # 1. 代码推送到 main 分支时
  push:
    branches: [ main ]
  # 2. 发起合并到 main 的 PR 时
  pull_request:
    branches: [ main ]

# 要执行的任务列表
jobs:

  # --- 核心测试任务：运行所有测试用例 ---
  run-tests:
    # 在 Ubuntu 最新系统上运行
    runs-on: ubuntu-latest

    steps:
      # 步骤1：把 GitHub 代码拉下来
      - uses: actions/checkout@v4

      # 步骤2：配置 Python 环境，版本 3.9
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 步骤3：安装依赖包（pytest、ragas 等）
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 步骤4：运行全部测试（质量、对抗、性能、鲁棒性）
      - name: Run all tests (Quality, Adversarial, Performance, Robustness)
        # 读取密钥：DeepSeek API Key
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
        # 执行总测试脚本
        run: python run_all_tests.py

      # 步骤5：上传综合测试报告
      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          # 报告名字
          name: combined-test-report
          # 报告文件路径
          path: combined_report.html

  # --- 新增：状态检查汇总任务（用来做质量门禁） ---
  check-status:
    # 依赖前面的 run-tests 任务，必须等它跑完
    needs: [run-tests]

    # 即使任务被取消，也执行检查
    if: ${{ !cancelled() }}

    runs-on: ubuntu-latest

    steps:
      # 检查测试是否成功
      - name: Check for failures
        run: |
          # 如果测试失败 → 输出错误并退出失败（1）
          if [ "${{ needs.run-tests.result }}" != "success" ]; then
            echo "❌ 测试失败！请检查上面的报告。"
            exit 1
          else
            echo "✅ 所有测试均已通过！"
          fi
