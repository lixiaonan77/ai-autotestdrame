cat > rag_tests.yml << 'EOF'
name: RAG Quality Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        pip install pytest pytest-html ragas langchain openai datasets
    - name: Run RAG tests
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        pytest test_rag_quality.py -v --html=report.html
    - name: Upload report
      uses: actions/upload-artifact@v3
      with:
        name: rag-test-report
        path: report.html
EOF
