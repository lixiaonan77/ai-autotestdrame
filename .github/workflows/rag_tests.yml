name: RAG Full Quality Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🔥 强制安装所有依赖，直接写死，永不报错
      - name: Install ALL dependencies (fixed)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html
          pip install langchain langchain-core langchain-community langchain-text-splitters
          pip install langchain-huggingface sentence-transformers
          pip install openai deepseek python-dotenv
          pip install pandas numpy ragas eval_type_backport

      - name: Run tests
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
        run: python run_all_tests.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: combined_report.html

  check-status:
    needs: run-tests
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [ "${{ needs.run-tests.result }}" != "success" ]; then
            echo "❌ 测试失败"
            exit 1
          else
            echo "✅ 全部通过"
          fi
