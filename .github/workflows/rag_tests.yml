name: RAG Full Quality Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (for easyocr)
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html
          pip install langchain langchain-core langchain-community langchain-text-splitters langchain-huggingface
          pip install sentence-transformers transformers torch
          pip install openai deepseek python-dotenv
          pip install pandas numpy ragas eval_type_backport
          pip install faiss-cpu easyocr

      - name: Run all tests
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
        run: python run_all_tests.py

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: combined_report.html

  check-status:
    needs: run-tests
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check test result
        run: |
          if [ "${{ needs.run-tests.result }}" != "success" ]; then
            echo "❌ 测试失败"
            exit 1
          else
            echo "✅ 全部测试通过"
          fi
